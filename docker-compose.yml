name: score-finance

x-backend-env: &backend-env
  SECRET_KEY: ${SECRET_KEY:-dev-secret-change-in-production}
  DEBUG: ${DEBUG:-true}
  FRONTEND_URL: http://localhost:3000
  PLUGGY_CLIENT_ID: ${PLUGGY_CLIENT_ID:-}
  PLUGGY_CLIENT_SECRET: ${PLUGGY_CLIENT_SECRET:-}
  PLUGGY_OAUTH_REDIRECT_URI: http://localhost:3000/oauth/callback
  REDIS_URL: redis://redis:6379/0
  OPENEXCHANGERATES_APP_ID: ${OPENEXCHANGERATES_APP_ID:-}
  FX_SYNC_MODE: ${FX_SYNC_MODE:-on_demand}
  STORAGE_LOCAL_PATH: /app/data/attachments

x-backend-base: &backend-base
  build: ./backend
  env_file: ./backend/.env
  environment: *backend-env
  depends_on:
    redis: { condition: service_healthy }
  volumes:
    - ./backend:/app
    - attachments:/app/data/attachments
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5



  backend:
    <<: *backend-base
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:5173"
    environment:
      BACKEND_URL: http://backend:8000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

  celery-worker:
    <<: *backend-base
    command: celery -A app.worker worker --loglevel=info

  celery-beat:
    <<: *backend-base
    command: celery -A app.worker beat --loglevel=info

volumes:
  attachments:
